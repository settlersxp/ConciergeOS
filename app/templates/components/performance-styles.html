<style>
/* ---- Layout ---- */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 24px;
}
@media (max-width: 900px) {
    .grid { grid-template-columns: 1fr; }
}

.card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
}
.card.full { grid-column: 1 / -1; }
.card h2 {
    font-size: 1.1rem;
    margin-bottom: 16px;
    color: var(--text);
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
}
.card h3 {
    font-size: 0.95rem;
    margin-bottom: 8px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.03em;
}

/* ---- Form ---- */
.form-group {
    margin-bottom: 14px;
}
.form-group label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 4px;
    color: var(--text);
}
.form-group input[type="text"],
.form-group input[type="number"],
.form-group select,
.form-group textarea {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
    border-color: var(--primary);
}
.form-group textarea {
    min-height: 80px;
    resize: vertical;
}
.form-row {
    display: flex;
    gap: 12px;
}
.form-row .form-group { flex: 1; }

.checkbox-group {
    display: flex;
    align-items: center;
    gap: 8px;
}
.checkbox-group input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: var(--primary);
}

/* ---- Buttons ---- */
.btn-row {
    display: flex;
    gap: 12px;
    margin-top: 20px;
}
.btn {
    padding: 10px 24px;
    border: none;
    border-radius: 6px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
}
.btn-primary {
    background: var(--primary);
    color: #fff;
}
.btn-primary:hover { background: var(--primary-hover); }
.btn-secondary {
    background: var(--border);
    color: var(--text);
}
.btn-secondary:hover { background: #cbd5e1; }
.btn:disabled { opacity: 0.6; cursor: not-allowed; }

/* ---- Status ---- */
.status-bar {
    display: none;
    padding: 16px;
    border-radius: 8px;
    margin-bottom: 24px;
    font-size: 0.95rem;
}
.status-bar.visible { display: block; }
.status-bar.running {
    background: #dbeafe;
    border: 1px solid #93c5fd;
    color: #1e40af;
}
.status-bar.success {
    background: #dcfce7;
    border: 1px solid #86efac;
    color: #166534;
}
.status-bar.error {
    background: #fee2e2;
    border: 1px solid #fca5a5;
    color: #991b1b;
}

/* ---- Results table ---- */
.results-wrapper {
    overflow-x: auto;
}
table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
}
th, td {
    padding: 8px 12px;
    border: 1px solid var(--border);
    text-align: left;
}
th {
    background: var(--bg);
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    font-size: 0.75rem;
    letter-spacing: 0.03em;
}
td { color: var(--text); }
.badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 0.75rem;
    font-weight: 600;
}
.badge-sequential { background: #dbeafe; color: #1e40af; }
.badge-concurrent { background: #fef3c7; color: #92400e; }
.badge-json { background: #dcfce7; color: #166534; }
.badge-text { background: #f1f5f9; color: #475569; }
.badge-ok { background: #dcfce7; color: #166534; }
.badge-malformed { background: #fee2e2; color: #991b1b; }
.badge-true { background: #dbeafe; color: #1e40af; }
.badge-false { background: #f1f5f9; color: #475569; }

/* ---- Expandable detail row ---- */
.detail-row td {
    background: #f8fafc;
    padding: 16px 12px;
    border-top: none !important;
}
.detail-panel {
    display: flex;
    gap: 16px;
    align-items: flex-start;
}
.response-preview {
    flex: 1;
    max-height: 240px;
    overflow: auto;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    font-family: "SF Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
    font-size: 0.8rem;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
}
.valid-switch-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    min-width: 120px;
}
.valid-switch-label {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
}
.valid-switch-value {
    font-size: 0.85rem;
    font-weight: 600;
    min-width: 40px;
    text-align: center;
}
.valid-switch-value.true-val { color: #22c55e; }
.valid-switch-value.false-val { color: #ef4444; }

/* Toggle switch */
.toggle-switch {
    position: relative;
    width: 52px;
    height: 28px;
}
.toggle-switch input {
    opacity: 0;
    width: 0;
    height: 0;
}
.toggle-slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background: var(--border);
    border-radius: 28px;
    transition: background 0.2s;
}
.toggle-slider:before {
    content: "";
    position: absolute;
    height: 22px;
    width: 22px;
    left: 3px;
    bottom: 3px;
    background: white;
    border-radius: 50%;
    transition: transform 0.2s;
}
.toggle-switch input:checked + .toggle-slider {
    background: #22c55e;
}
.toggle-switch input:checked + .toggle-slider:before {
    transform: translateX(24px);
}

/* Clickable table row */
.clickable-row {
    cursor: pointer;
}
.clickable-row:hover td {
    background: #f1f5f9;
}

/* ---- Summary cards ---- */
.summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
}
.summary-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    text-align: center;
}
.summary-card .value {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--primary);
}
.summary-card .label {
    font-size: 0.8rem;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 4px;
}

/* ---- Compare checkboxes ---- */
.compare-checkbox {
    width: 18px;
    height: 18px;
    accent-color: var(--primary);
    cursor: pointer;
}
.compare-header {
    cursor: pointer;
    user-select: none;
}

/* ---- Compare button ---- */
.btn-compare {
    background: #f59e0b;
    color: #1a1a1a;
}
.btn-compare:hover { background: #d97706; }
.btn-compare:disabled { opacity: 0.4; cursor: not-allowed; }

/* ---- Comparison Modal ---- */
.compare-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 9999;
    justify-content: center;
    align-items: flex-start;
    padding: 24px;
    overflow-y: auto;
}
.compare-modal-overlay.visible {
    display: flex;
}
.compare-modal {
    background: var(--card);
    border-radius: 12px;
    width: 100%;
    max-width: 1400px;
    min-width: 700px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
    display: flex;
    flex-direction: column;
    max-height: calc(100vh - 48px);
}
.compare-modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
}
.compare-modal-header h3 {
    font-size: 1.1rem;
    margin: 0;
    text-transform: none;
    letter-spacing: normal;
    color: var(--text);
}
.compare-modal-close {
    background: none;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    color: var(--muted);
    line-height: 1;
    padding: 4px 8px;
    border-radius: 4px;
}
.compare-modal-close:hover {
    background: var(--bg);
    color: #ef4444;
}
.compare-modal-body {
    display: flex;
    flex: 1;
    overflow: hidden;
    min-height: 400px;
}
.compare-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.compare-panel:first-child {
    border-right: 1px solid var(--border);
}
.compare-panel-header {
    padding: 12px 16px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    font-size: 0.8rem;
    color: var(--muted);
}
.compare-panel-header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
}
.compare-panel-header .meta-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
}
/* Toggle in modal header */
.compare-valid-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
}
.compare-valid-toggle .toggle-switch {
    width: 44px;
    height: 24px;
}
.compare-valid-toggle .toggle-switch input {
    opacity: 0;
    width: 0;
    height: 0;
}
.compare-valid-toggle .toggle-slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background: var(--border);
    border-radius: 24px;
    transition: background 0.2s;
}
.compare-valid-toggle .toggle-slider:before {
    content: "";
    position: absolute;
    height: 18px;
    width: 18px;
    left: 3px;
    bottom: 3px;
    background: white;
    border-radius: 50%;
    transition: transform 0.2s;
}
.compare-valid-toggle .toggle-switch input:checked + .toggle-slider {
    background: #22c55e;
}
.compare-valid-toggle .toggle-switch input:checked + .toggle-slider:before {
    transform: translateX(20px);
}
.compare-valid-label {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
}
.compare-valid-label.valid { color: #22c55e; }
.compare-valid-label.invalid { color: #ef4444; }
.compare-valid-label.not-set { color: var(--muted); }
.compare-panel-header .meta-item {
    display: flex;
    flex-direction: column;
}
.compare-panel-header .meta-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--muted);
}
.compare-panel-header .meta-value {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text);
}
.compare-panel-content {
    flex: 1;
    overflow: auto;
    padding: 0;
}
.compare-diff-pre {
    margin: 0;
    padding: 16px;
    font-family: "SF Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
    font-size: 0.8rem;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 100%;
}
.diff-added {
    background: #dcfce7;
    display: inline;
}
.diff-removed {
    background: #fee2e2;
    display: inline;
}
.diff-common {
    /* neutral */
}
/* Simple word-level diff spans */
.diff-ins {
    background: #bbf7d0;
    border-radius: 2px;
}
.diff-del {
    background: #fecaca;
    text-decoration: line-through;
    border-radius: 2px;
}

/* ---- Guest list table ---- */
.guest-list-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
    margin-top: 8px;
}
.guest-list-table th,
.guest-list-table td {
    padding: 6px 10px;
    border: 1px solid var(--border);
    text-align: left;
}
.guest-list-table th {
    background: var(--bg);
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    font-size: 0.75rem;
    letter-spacing: 0.03em;
}
.guest-list-table td {
    color: var(--text);
}
.guest-assignment {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 0.75rem;
    font-weight: 600;
}
.guest-assignment.sequential { background: #dbeafe; color: #1e40af; }
.guest-assignment.concurrent { background: #fef3c7; color: #92400e; }
.guest-count-ok { color: #22c55e; font-weight: 600; }
.guest-count-warn { color: #ef4444; font-weight: 600; }
</style>
