<!-- Comparison Modal -->
<div class="compare-modal-overlay" id="compareModal" onclick="if(event.target===this)closeCompareModal()">
    <div class="compare-modal">
        <div class="compare-modal-header">
            <h3>Side-by-Side Comparison</h3>
            <button class="compare-modal-close" onclick="closeCompareModal()">&times;</button>
        </div>
        <div class="compare-modal-body">
            <div class="compare-panel">
                <div class="compare-panel-header" id="comparePanelAHeader">
                    <div class="compare-panel-header-top">
                        <span style="font-weight:700;font-size:0.85rem;color:var(--text);">Response A</span>
                        <div class="compare-valid-toggle" id="compareValidToggleA"></div>
                    </div>
                    <div class="meta-row" id="comparePanelAMeta"></div>
                </div>
                <div class="compare-panel-content" id="comparePanelAContent"></div>
            </div>
            <div class="compare-panel">
                <div class="compare-panel-header" id="comparePanelBHeader">
                    <div class="compare-panel-header-top">
                        <span style="font-weight:700;font-size:0.85rem;color:var(--text);">Response B</span>
                        <div class="compare-valid-toggle" id="compareValidToggleB"></div>
                    </div>
                    <div class="meta-row" id="comparePanelBMeta"></div>
                </div>
                <div class="compare-panel-content" id="comparePanelBContent"></div>
            </div>
        </div>
    </div>
</div>
