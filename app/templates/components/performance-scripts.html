<script>
    const statusBar = document.getElementById('statusBar');

    // Lookup map: result id -> row data object
    var rowDataMap = {};

    function showStatus(message, type) {
        statusBar.textContent = message;
        statusBar.className = 'status-bar visible ' + type;
    }

    function hideStatus() {
        statusBar.className = 'status-bar';
    }

    async function fetchModelInfo() {
        const btn = document.getElementById('fetchModelBtn');
        if (!btn) { console.error('fetchModelInfo: button #fetchModelBtn not found'); return; }
        btn.disabled = true;
        btn.textContent = 'Fetching...';

        try {
            const url = document.getElementById('modelsEndpoint').value;
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            const models = data.data || [];
            if (!models.length) throw new Error('No models found');

            const m = models[0];
            document.getElementById('modelName').value = m.id || m.model || 'unknown';

            let version = m.vllm_version || '';
            if (!version && m.extra && typeof m.extra === 'object') {
                version = m.extra.vllm_version || 'unknown';
            }
            document.getElementById('vllmVersion').value = version || 'unknown';

            let thinking = false;
            if (m.capabilities && typeof m.capabilities === 'object') {
                thinking = m.capabilities.thinking || false;
            }
            const mtype = String(m.type || '');
            if (mtype.toLowerCase().includes('thinking')) thinking = true;
            document.getElementById('thinkingEnabled').checked = thinking;

            showStatus('Model info fetched successfully.', 'success');
        } catch (err) {
            showStatus('Failed to fetch model info: ' + err.message, 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Fetch Model Info';
        }
    }

    // Generate a random UUID v4 (only if not already defined by common_scripts.html)
    var _localGenerateUuid = (function() {
        if (typeof generateUuid === 'function') return generateUuid;
        return function() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0;
                var v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        };
    })();

    function whenReady(fn) {
        if (document.readyState === 'complete') {
            fn();
        } else {
            window.addEventListener('load', fn);
        }
    }

    // Populate batch UUID field if empty (deferred until DOM ready)
    whenReady(function initBatchUuid() {
        var uuidField = document.getElementById('batchUuid');
        if (!uuidField) return; // Guard: element may not exist
        if (!uuidField.value.trim()) {
            uuidField.value = generateUuid();
        }
    });

    // Populate batch dropdown on page load
    async function populateBatchDropdown() {
        try {
            const res = await fetch('/api/performance-testing/batches');
            if (!res.ok) return;
            const batches = await res.json();
            const select = document.getElementById('batchSelect');
            // Keep the default option
            select.innerHTML = '<option value="">— Select a batch —</option>';
            batches.forEach(function(b) {
                const opt = document.createElement('option');
                opt.value = b.batch_uuid;
                const name = b.friendly_name || b.batch_uuid.substring(0, 8) + '...';
                opt.textContent = name + ' (' + b.total_requests + ' requests)';
                select.appendChild(opt);
            });
        } catch (err) {
            console.error('Failed to load batches:', err);
        }
    }

    // Load batch dropdown on page load (deferred until DOM ready)
    whenReady(populateBatchDropdown);

    // ---- Test Mode Toggle ----
    function onTestModeChange() {
        var isMulti = document.querySelector('input[name="testMode"][value="multi"]').checked;
        var multiGuestInfo = document.getElementById('multiGuestInfo');
        var customerNameGroup = document.getElementById('customerNameGroup');

        if (isMulti) {
            multiGuestInfo.style.display = 'block';
            customerNameGroup.style.display = 'none';
        } else {
            multiGuestInfo.style.display = 'none';
            customerNameGroup.style.display = 'block';
        }
    }

    function gatherSettings() {
        var isMulti = document.querySelector('input[name="testMode"][value="multi"]').checked;
        return {
            test_mode: isMulti ? "multi" : "single",
            batch_uuid: document.getElementById('batchUuid').value.trim() || generateUuid(),
            friendly_name: document.getElementById('friendlyName').value.trim(),
            customer_name: document.getElementById('customerName').value.trim(),
            vllm_url: document.getElementById('vllmUrl').value.trim(),
            models_endpoint: document.getElementById('modelsEndpoint').value.trim(),
            sequential_batch_size: parseInt(document.getElementById('sequentialBatch').value) || 5,
            concurrent_batch_size: parseInt(document.getElementById('concurrentBatch').value) || 8,
            model_name: document.getElementById('modelName').value.trim(),
            vllm_version: document.getElementById('vllmVersion').value.trim(),
            thinking_enabled: document.getElementById('thinkingEnabled').checked,
            system_prompt: document.getElementById('systemPrompt').value.trim(),
            user_prompt: document.getElementById('userPrompt').value.trim(),
            expected_response_format: document.getElementById('expectedFormat').value,
        };
    }

    async function runTests() {
        const runBtn = document.getElementById('runBtn');
        const loadBtn = document.getElementById('loadResultsBtn');
        runBtn.disabled = true;
        loadBtn.disabled = true;
        showStatus('Running performance tests... This may take a while.', 'running');

        const settings = gatherSettings();

        try {
            const res = await fetch('/api/performance-testing', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(settings),
            });

            if (!res.ok) {
                const err = await res.json().catch(() => null);
                throw new Error(err?.detail || err?.error || `Server error: ${res.status}`);
            }

            const data = await res.json();
            var label = data.friendly_name ? '"' + data.friendly_name + '"' : 'UUID ' + data.batch_uuid.substring(0, 8);
            showStatus(`Tests completed! Run #${data.run_id} (${label}) — ${data.total_requests} requests total.`, 'success');
            renderResults(data);
            // Refresh the dropdown with the new batch
            populateBatchDropdown();
            // Regenerate a new UUID for the next run
            document.getElementById('batchUuid').value = generateUuid();
        } catch (err) {
            showStatus('Error running tests: ' + err.message, 'error');
        } finally {
            runBtn.disabled = false;
            loadBtn.disabled = false;
        }
    }

    async function loadResults() {
        showStatus('Loading latest results...', 'running');
        try {
            const res = await fetch('/api/performance-testing/results');
            if (!res.ok) throw new Error(`Server error: ${res.status}`);
            const data = await res.json();
            if (!data.length) {
                showStatus('No results found in database.', 'error');
                return;
            }
            renderResultsFromRaw(data);
            showStatus(`Results loaded successfully. ${data.length} records retrieved (latest 100).`, 'success');
        } catch (err) {
            showStatus('Error loading results: ' + err.message, 'error');
        }
    }

    async function loadAllResults() {
        showStatus('Loading all results from database...', 'running');
        try {
            const res = await fetch('/api/performance-testing/all-results');
            if (!res.ok) throw new Error(`Server error: ${res.status}`);
            const data = await res.json();
            if (!data.length) {
                showStatus('No results found in database.', 'error');
                return;
            }
            renderResultsFromRaw(data);
            showStatus(`All results loaded successfully. ${data.length} records retrieved.`, 'success');
        } catch (err) {
            showStatus('Error loading all results: ' + err.message, 'error');
        }
    }

    async function loadBatchByUuid() {
        const select = document.getElementById('batchSelect');
        const batchUuid = select.value;
        if (!batchUuid) {
            showStatus('Please select a batch from the dropdown.', 'error');
            return;
        }
        showStatus('Loading batch results...', 'running');
        try {
            const res = await fetch('/api/performance-testing/results-by-batch?batch_uuid=' + encodeURIComponent(batchUuid));
            if (!res.ok) throw new Error(`Server error: ${res.status}`);
            const data = await res.json();
            if (!data.length) {
                showStatus('No results found for selected batch.', 'error');
                return;
            }
            renderResultsFromRaw(data);
            var friendlyName = data[0].friendly_name || batchUuid.substring(0, 8);
            showStatus(`Batch "${friendlyName}" loaded. ${data.length} records retrieved.`, 'success');
        } catch (err) {
            showStatus('Error loading batch: ' + err.message, 'error');
        }
    }

    function renderResults(data) {
        document.getElementById('resultsSection').style.display = 'block';
        document.getElementById('runIdDisplay').textContent = data.run_id;

        // Summary
        const seq = data.sequential_results || [];
        const conc = data.concurrent_results || [];
        const all = [...seq, ...conc];
        const times = all.map(r => r.elapsed);
        const avg = times.length ? (times.reduce((a, b) => a + b, 0) / times.length).toFixed(2) : 0;
        const min = times.length ? Math.min(...times).toFixed(2) : 0;
        const max = times.length ? Math.max(...times).toFixed(2) : 0;

        document.getElementById('summaryGrid').innerHTML = `
            <div class="summary-card">
                <div class="value">${data.total_requests}</div>
                <div class="label">Total Requests</div>
            </div>
            <div class="summary-card">
                <div class="value">${avg}s</div>
                <div class="label">Avg Response Time</div>
            </div>
            <div class="summary-card">
                <div class="value">${min}s</div>
                <div class="label">Min Response Time</div>
            </div>
            <div class="summary-card">
                <div class="value">${max}s</div>
                <div class="label">Max Response Time</div>
            </div>
            <div class="summary-card">
                <div class="value">${data.model_name || '—'}</div>
                <div class="label">Model</div>
            </div>
        `;

        // Table (we only have timing here, details come from DB)
        const tbody = document.getElementById('resultsBody');
        tbody.innerHTML = '';
        all.forEach((r, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${i + 1}</td>
                <td><span class="badge badge-${r.batch_type}">${r.batch_type}</span></td>
                <td>${data.model_name || '—'}</td>
                <td>${data.vllm_version || '—'}</td>
                <td>${data.thinking_enabled ? '<span class="badge badge-true">Yes</span>' : '<span class="badge badge-false">No</span>'}</td>
                <td>${r.context_length != null && r.context_length !== undefined ? r.context_length : '—'}</td>
                <td><span class="badge badge-${(r.response_format || 'text').toLowerCase()}">${r.response_format || '—'}</span></td>
                <td>${r.json_malformed === null || r.json_malformed === undefined ? '—' :
                      r.json_malformed ? '<span class="badge badge-malformed">Malformed</span>' :
                      '<span class="badge badge-ok">OK</span>'}</td>
                <td>${r.response_length != null && r.response_length !== undefined ? r.response_length : '—'}</td>
                <td>${r.request_sent_time ? new Date(r.request_sent_time).toLocaleTimeString() : '—'}</td>
                <td>${r.response_received_time ? new Date(r.response_received_time).toLocaleTimeString() : '—'}</td>
                <td>${r.elapsed}s</td>
            `;
            tbody.appendChild(tr);
        });

        // Scroll to results
        document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth' });
    }

    // Track which row is currently expanded
    var expandedDetailRow = null;

    /**
     * Toggle the detail panel underneath a given table row.
     * If the same row is clicked again, the panel is removed.
     */
    function toggleDetailRow(tr, row) {
        // If clicking the already-expanded row, collapse it
        if (expandedDetailRow && expandedDetailRow.parentTr === tr) {
            expandedDetailRow.remove();
            expandedDetailRow = null;
            return;
        }

        // Remove any previously expanded detail row
        if (expandedDetailRow) {
            expandedDetailRow.remove();
        }

        // Escape HTML for safe rendering
        function escapeHtml(str) {
            var div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        var responseContent = row.response_content || '(no response content)';
        // SQLite may return valid_response as integer 0/1 or boolean true/false
        var validResponse = row.valid_response;
        var isValid = validResponse ? true : false;

        // Determine initial toggle state: null/undefined → unchecked, truthy → checked
        var isChecked = isValid;

        // Determine the displayed value label
        var valueLabel, valueClass;
        if (validResponse === null || validResponse === undefined) {
            valueLabel = 'Not set';
            valueClass = '';
        } else if (isValid) {
            valueLabel = 'Valid';
            valueClass = 'true-val';
        } else {
            valueLabel = 'Invalid';
            valueClass = 'false-val';
        }

        var detailRow = tr.parentNode.insertRow(tr.sectionRowIndex + 1);
        detailRow.className = 'detail-row';
        detailRow.innerHTML = `
            <td colspan="13">
                <div class="detail-panel">
                    <div class="response-preview">${escapeHtml(responseContent)}</div>
                    <div class="valid-switch-wrapper">
                        <span class="valid-switch-label">Valid Response</span>
                        <label class="toggle-switch">
                            <input type="checkbox" ${isChecked ? 'checked' : ''} data-result-id="${row.id}">
                            <span class="toggle-slider"></span>
                        </label>
                        <span class="valid-switch-value ${valueClass}">${valueLabel}</span>
                    </div>
                </div>
            </td>
        `;

        // Store reference so we can collapse later
        expandedDetailRow = detailRow;
        expandedDetailRow.parentTr = tr;

        // Attach change handler to the toggle switch
        var checkbox = detailRow.querySelector('.toggle-switch input');
        var valueSpan = detailRow.querySelector('.valid-switch-value');
        checkbox.addEventListener('change', function() {
            var resultId = this.getAttribute('data-result-id');
            var newVal = this.checked;

            // Update the label immediately for responsiveness
            if (newVal) {
                valueSpan.textContent = 'Valid';
                valueSpan.className = 'valid-switch-value true-val';
            } else {
                valueSpan.textContent = 'Invalid';
                valueSpan.className = 'valid-switch-value false-val';
            }

            // Persist to the database
            fetch('/api/performance-testing/result/' + resultId, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ valid_response: newVal })
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.error) {
                    console.error('Failed to save valid_response:', data.error);
                }
            })
            .catch(function(err) {
                console.error('Error saving valid_response:', err);
            });
        });
    }

    function renderResultsFromRaw(rows) {
        document.getElementById('resultsSection').style.display = 'block';
        const runIds = [...new Set(rows.map(r => r.run_id))];
        document.getElementById('runIdDisplay').textContent = runIds.join(', ');

        // Summary
        const times = rows.map(r => {
            const sent = new Date(r.request_sent_time);
            const received = new Date(r.response_received_time);
            return (received - sent) / 1000;
        });
        const avg = times.length ? (times.reduce((a, b) => a + b, 0) / times.length).toFixed(2) : 0;
        const min = times.length ? Math.min(...times).toFixed(2) : 0;
        const max = times.length ? Math.max(...times).toFixed(2) : 0;

        document.getElementById('summaryGrid').innerHTML = `
            <div class="summary-card">
                <div class="value">${rows.length}</div>
                <div class="label">Total Requests</div>
            </div>
            <div class="summary-card">
                <div class="value">${avg}s</div>
                <div class="label">Avg Response Time</div>
            </div>
            <div class="summary-card">
                <div class="value">${min}s</div>
                <div class="label">Min Response Time</div>
            </div>
            <div class="summary-card">
                <div class="value">${max}s</div>
                <div class="label">Max Response Time</div>
            </div>
        `;

        // Table
        const tbody = document.getElementById('resultsBody');
        tbody.innerHTML = '';

        // Collapse any expanded row when re-rendering
        if (expandedDetailRow) {
            expandedDetailRow.remove();
            expandedDetailRow = null;
        }

        // Clear comparison selections on re-render
        selectedCompareRows = [];
        rowDataMap = {};
        updateCompareButton();

        rows.forEach((r, i) => {
            const sent = new Date(r.request_sent_time);
            const received = new Date(r.response_received_time);
            const elapsed = ((received - sent) / 1000).toFixed(2);

            // Store in lookup map for checkbox handler
            rowDataMap[r.id] = r;

            const tr = document.createElement('tr');
            tr.className = 'clickable-row';
            tr.innerHTML = `
                <td>
                    <input type="checkbox" class="compare-checkbox" data-id="${r.id}">
                </td>
                <td>${i + 1}</td>
                <td><span class="badge badge-${r.batch_type}">${r.batch_type}</span></td>
                <td>${r.model_name || '\u2014'}</td>
                <td>${r.vllm_version || '\u2014'}</td>
                <td>${r.thinking_enabled ? '<span class="badge badge-true">Yes</span>' : '<span class="badge badge-false">No</span>'}</td>
                <td>${r.context_length ?? '\u2014'}</td>
                <td><span class="badge badge-${(r.response_format || 'text').toLowerCase()}">${r.response_format || '\u2014'}</span></td>
                <td>${r.json_malformed === null || r.json_malformed === undefined ? '\u2014' :
                      r.json_malformed ? '<span class="badge badge-malformed">Malformed</span>' :
                      '<span class="badge badge-ok">OK</span>'}</td>
                <td>${r.response_length ?? '\u2014'}</td>
                <td>${sent.toLocaleTimeString()}</td>
                <td>${received.toLocaleTimeString()}</td>
                <td>${elapsed}s</td>
            `;

            // Attach checkbox change handler
            var cb = tr.querySelector('.compare-checkbox');
            cb.addEventListener('change', function(e) {
                e.stopPropagation();
                toggleCompareSelection(this, rowDataMap[this.getAttribute('data-id')]);
            });

            // Attach click handler for expanding detail panel
            tr.addEventListener('click', function(e) {
                // Don't toggle if clicking the checkbox
                if (e.target.classList.contains('compare-checkbox')) return;
                toggleDetailRow(tr, r);
            });

            tbody.appendChild(tr);
        });

        document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth' });
    }

    // ---- Comparison feature ----
    var selectedCompareRows = [];

    function toggleCompareSelection(checkbox, row) {
        if (checkbox.checked) {
            if (selectedCompareRows.length >= 2) {
                // Remove the first one to make room
                var removed = selectedCompareRows.shift();
                var oldCb = document.querySelector('.compare-checkbox[data-id="' + removed.id + '"]');
                if (oldCb) oldCb.checked = false;
            }
            selectedCompareRows.push(row);
        } else {
            selectedCompareRows = selectedCompareRows.filter(function(r) { return r.id !== row.id; });
        }
        updateCompareButton();
    }

    function updateCompareButton() {
        var btn = document.getElementById('compareBtn');
        if (btn) {
            btn.disabled = selectedCompareRows.length !== 2;
            btn.textContent = 'Compare Selected (' + selectedCompareRows.length + '/2)';
        }
    }

    function openCompareModal() {
        if (selectedCompareRows.length !== 2) return;
        var a = selectedCompareRows[0];
        var b = selectedCompareRows[1];

        var modal = document.getElementById('compareModal');
        modal.classList.add('visible');

        // Render meta info into the meta-row containers (not the full header)
        var renderMeta = function(row, metaContainerId) {
            var sent = new Date(row.request_sent_time);
            var received = new Date(row.response_received_time);
            var elapsed = ((received - sent) / 1000).toFixed(2);
            var modelName = row.model_name || '\u2014';
            var respLen = row.response_length != null && row.response_length !== undefined ? row.response_length : '\u2014';
            var fmt = row.response_format || '\u2014';
            var jsonStatus = row.json_malformed === true ? 'Malformed' : row.json_malformed === false ? 'OK' : '\u2014';
            document.getElementById(metaContainerId).innerHTML =
                '<div class="meta-item"><span class="meta-label">Batch</span><span class="meta-value">' + row.batch_type + '</span></div>' +
                '<div class="meta-item"><span class="meta-label">Model</span><span class="meta-value">' + modelName + '</span></div>' +
                '<div class="meta-item"><span class="meta-label">Elapsed</span><span class="meta-value">' + elapsed + 's</span></div>' +
                '<div class="meta-item"><span class="meta-label">Length</span><span class="meta-value">' + respLen + '</span></div>' +
                '<div class="meta-item"><span class="meta-label">Format</span><span class="meta-value">' + fmt + '</span></div>' +
                '<div class="meta-item"><span class="meta-label">JSON</span><span class="meta-value">' + jsonStatus + '</span></div>';
        };

        renderMeta(a, 'comparePanelAMeta');
        renderMeta(b, 'comparePanelBMeta');

        // Render valid_response toggles
        renderCompareValidToggle(a, 'compareValidToggleA');
        renderCompareValidToggle(b, 'compareValidToggleB');

        var contentA = a.response_content || '(no response content)';
        var contentB = b.response_content || '(no response content)';

        var diffed = computeLineDiff(contentA, contentB);
        document.getElementById('comparePanelAContent').innerHTML = '<pre class="compare-diff-pre">' + diffed.left + '</pre>';
        document.getElementById('comparePanelBContent').innerHTML = '<pre class="compare-diff-pre">' + diffed.right + '</pre>';

        // Sync scrolling — single-source approach
        var scrollA = document.getElementById('comparePanelAContent');
        var scrollB = document.getElementById('comparePanelBContent');

        // Reset state
        scrollA._lastSyncedTop = 0;
        scrollA._lastSyncedLeft = 0;
        scrollB._lastSyncedTop = 0;
        scrollB._lastSyncedLeft = 0;
        scrollA.scrollTop = 0;
        scrollB.scrollTop = 0;
        _scrollEventCount = 0;
        _syncScrolling = false;

        // Remove old listeners and re-add
        scrollA.removeEventListener('scroll', syncScroll);
        scrollB.removeEventListener('scroll', syncScroll);
        scrollA.addEventListener('scroll', syncScroll);
        scrollB.addEventListener('scroll', syncScroll);

        // Manual wheel-driven scroll — prevent default to kill momentum races
        scrollA.removeEventListener('wheel', onCompareWheel);
        scrollB.removeEventListener('wheel', onCompareWheel);
        scrollA.addEventListener('wheel', onCompareWheel, { passive: false });
        scrollB.addEventListener('wheel', onCompareWheel, { passive: false });

        // Both panels stay scrollable (for programmatic scrollTop changes to work)
        scrollA.style.overflow = 'auto';
        scrollB.style.overflow = 'auto';

        // Log initial content dimensions after render
        requestAnimationFrame(function() {
            var maxA = scrollA.scrollHeight - scrollA.clientHeight;
            var maxB = scrollB.scrollHeight - scrollB.clientHeight;
            console.log('[CompareModal] Initial dimensions:',
                'A.scrollHeight=' + scrollA.scrollHeight +
                ', B.scrollHeight=' + scrollB.scrollHeight +
                ' | A_maxScroll=' + maxA +
                ', B_maxScroll=' + maxB +
                ' | diff=' + Math.abs(maxA - maxB) + 'px');
        });
    }

    /**
     * Render a valid_response toggle into a comparison panel header.
     */
    function renderCompareValidToggle(row, containerId) {
        var container = document.getElementById(containerId);
        var validResponse = row.valid_response;
        var isValid = validResponse ? true : false;
        var isUnset = (validResponse === null || validResponse === undefined);

        var labelClass = isUnset ? 'not-set' : (isValid ? 'valid' : 'invalid');
        var labelText = isUnset ? 'Not set' : (isValid ? 'Valid' : 'Invalid');

        container.innerHTML =
            '<span class="compare-valid-label ' + labelClass + '">' + labelText + '</span>' +
            '<label class="toggle-switch">' +
                '<input type="checkbox" ' + (isValid ? 'checked' : '') + ' data-result-id="' + row.id + '">' +
                '<span class="toggle-slider"></span>' +
            '</label>';

        var checkbox = container.querySelector('input[type="checkbox"]');
        var labelSpan = container.querySelector('.compare-valid-label');

        checkbox.addEventListener('change', function() {
            var resultId = this.getAttribute('data-result-id');
            var newVal = this.checked;

            if (newVal) {
                labelSpan.textContent = 'Valid';
                labelSpan.className = 'compare-valid-label valid';
            } else {
                labelSpan.textContent = 'Invalid';
                labelSpan.className = 'compare-valid-label invalid';
            }

            // Also update the rowDataMap so re-opens stay in sync
            if (rowDataMap[resultId]) {
                rowDataMap[resultId].valid_response = newVal;
            }

            // Persist to the database
            fetch('/api/performance-testing/result/' + resultId, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ valid_response: newVal })
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.error) {
                    console.error('Failed to save valid_response:', data.error);
                }
            })
            .catch(function(err) {
                console.error('Error saving valid_response:', err);
            });
        });
    }

    var _syncScrolling = false;
    var _scrollEventCount = 0;
    var _lastScrollLogTime = 0;

    /**
     * Manual wheel-driven scroll sync.
     *
     * ROOT CAUSE of jumpiness: Both panels independently momentum-scroll (browser
     * inertial scrolling fires scroll events on each panel separately), so each
     * panel fires its own scroll events. When we try to sync by reading/writing
     * scrollTop, the source panel's position has already drifted from momentum by
     * the time the next event fires, causing the target to jump backward.
     *
     * FIX: Prevent the browser's default scroll behavior entirely. Capture the
     * wheel event, compute the scroll delta, and manually apply it to BOTH panels
     * in the same synchronous block.  This guarantees both panels move together
     * without any momentum race condition because the browser never independently
     * scrolls either panel.
     */

    function onCompareWheel(e) {
        e.preventDefault();

        var scrollA = document.getElementById('comparePanelAContent');
        var scrollB = document.getElementById('comparePanelBContent');

        _scrollEventCount++;
        var now = performance.now();
        var timeSinceLast = now - _lastScrollLogTime;
        _lastScrollLogTime = now;

        // Determine scroll direction
        var delta = Math.abs(e.deltaY) > Math.abs(e.deltaX) ? e.deltaY : e.deltaX;

        // Apply to both panels — clamped to valid range
        scrollA.scrollTop = Math.max(0, scrollA.scrollTop + delta);
        scrollB.scrollTop = Math.max(0, scrollB.scrollTop + delta);

        // Log diagnostics (throttled)
        if (_scrollEventCount % 5 === 0 || timeSinceLast < 50) {
            var maxA = scrollA.scrollHeight - scrollA.clientHeight || 1;
            var maxB = scrollB.scrollHeight - scrollB.clientHeight || 1;
            var pctA = (scrollA.scrollTop / maxA * 100).toFixed(1);
            var pctB = (scrollB.scrollTop / maxB * 100).toFixed(1);
            var dt = timeSinceLast.toFixed(1);
            console.log('[CompareScroll] #' + _scrollEventCount + ' | wheel dt=' + dt + 'ms delta=' + delta.toFixed(0) +
                ' | A ' + scrollA.scrollTop + '/' + maxA + ' (' + pctA + '%)' +
                ' | B ' + scrollB.scrollTop + '/' + maxB + ' (' + pctB + '%)');
        }
    }

    /* Scroll handler no longer needed — kept for compat (should not fire) */
    function syncScroll(e) {
        _scrollEventCount++;
        var now = performance.now();
        var timeSinceLast = now - _lastScrollLogTime;
        _lastScrollLogTime = now;
        var scrollA = document.getElementById('comparePanelAContent');
        var scrollB = document.getElementById('comparePanelBContent');
        console.log('[CompareScroll] #' + _scrollEventCount + ' | UNEXPECTED scroll event from ' +
            (e.target === scrollA ? 'A' : 'B') +
            ' (should only be driven by wheel)');
    }

    function closeCompareModal() {
        var modal = document.getElementById('compareModal');
        modal.classList.remove('visible');
        var scrollA = document.getElementById('comparePanelAContent');
        var scrollB = document.getElementById('comparePanelBContent');
        scrollA.style.overflow = '';
        scrollB.style.overflow = '';
    }

    /**
     * LCS-based line diff. For very large inputs falls back to plain display.
     */
    function computeLineDiff(textA, textB) {
        var linesA = textA.split('\n');
        var linesB = textB.split('\n');
        var m = linesA.length;
        var n = linesB.length;

        // For large inputs, fall back to plain display without diff
        if (m > 300 || n > 300) {
            return {
                left: escapeHtml(textA),
                right: escapeHtml(textB)
            };
        }

        // Build DP table for LCS
        var dp = [];
        for (var i = 0; i <= m; i++) {
            dp[i] = [];
            for (var j = 0; j <= n; j++) {
                dp[i][j] = 0;
            }
        }
        for (var i = 1; i <= m; i++) {
            for (var j = 1; j <= n; j++) {
                if (linesA[i - 1] === linesB[j - 1]) {
                    dp[i][j] = dp[i - 1][j - 1] + 1;
                } else {
                    dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
                }
            }
        }

        // Backtrack
        var ops = [];
        var i = m, j = n;
        while (i > 0 || j > 0) {
            if (i > 0 && j > 0 && linesA[i - 1] === linesB[j - 1]) {
                ops.unshift({ type: 'common', line: linesA[i - 1] });
                i--; j--;
            } else if (j > 0 && (i === 0 || dp[i][j - 1] >= dp[i - 1][j])) {
                ops.unshift({ type: 'added', line: linesB[j - 1] });
                j--;
            } else {
                ops.unshift({ type: 'removed', line: linesA[i - 1] });
                i--;
            }
        }

        // Build side-by-side HTML
        var leftHtml = '';
        var rightHtml = '';
        var iOp = 0;
        while (iOp < ops.length) {
            if (ops[iOp].type === 'common') {
                var h = '<span class="diff-common">' + escapeHtml(ops[iOp].line) + '</span>';
                leftHtml += h + '\n';
                rightHtml += h + '\n';
                iOp++;
            } else {
                // Collect a contiguous block of removed/added lines
                var removedLines = [];
                var addedLines = [];
                while (iOp < ops.length && ops[iOp].type !== 'common') {
                    if (ops[iOp].type === 'removed') removedLines.push(ops[iOp].line);
                    else addedLines.push(ops[iOp].line);
                    iOp++;
                }
                // Render the block: left gets removed, right gets added, pad shorter side
                var maxLen = Math.max(removedLines.length, addedLines.length);
                for (var k = 0; k < maxLen; k++) {
                    if (k < removedLines.length) {
                        leftHtml += '<span class="diff-removed">' + escapeHtml(removedLines[k]) + '</span>\n';
                    } else {
                        leftHtml += '\n';
                    }
                    if (k < addedLines.length) {
                        rightHtml += '<span class="diff-added">' + escapeHtml(addedLines[k]) + '</span>\n';
                    } else {
                        rightHtml += '\n';
                    }
                }
            }
        }

        return { left: leftHtml, right: rightHtml };
    }

    function escapeHtml(str) {
        var div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // ---- Test Guest Management ----

    async function setupTestGuests() {
        var btn = document.getElementById('setupGuestsBtn');
        btn.disabled = true;
        btn.textContent = 'Setting up...';
        showStatus('Creating 13 test guests with 4 reservations each...', 'running');

        try {
            var res = await fetch('/api/performance-testing/setup-guests', {
                method: 'POST',
            });

            if (!res.ok) {
                var err = await res.json().catch(() => null);
                throw new Error(err?.error || err?.detail || `Server error: ${res.status}`);
            }

            var data = await res.json();

            if (!data.ok) {
                throw new Error(data.error || 'Setup failed');
            }

            showStatus(
                '✅ ' + data.total + ' test guests created successfully! ' +
                '(4 reservations each = ' + (data.total * 4) + ' total reservations)',
                'success'
            );

            // Populate the guest list table
            renderGuestList(data.guests);

        } catch (err) {
            showStatus('Error setting up guests: ' + err.message, 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Setup 13 Test Guests';
        }
    }

    async function refreshGuestList() {
        var btn = document.getElementById('refreshGuestsBtn');
        if (!btn) { console.error('refreshGuestList: button #refreshGuestsBtn not found'); return; }
        btn.disabled = true;
        btn.textContent = 'Loading...';
        var statusEl = document.getElementById('guestListStatus');
        if (statusEl) statusEl.textContent = 'Loading guest list...';

        try {
            var res = await fetch('/api/performance-testing/test-guests');

            if (!res.ok) {
                throw new Error(`Server error: ${res.status}`);
            }

            var guests = await res.json();

            var guestListStatus = document.getElementById('guestListStatus');
            var guestListContainer = document.getElementById('guestListContainer');
            if (!guests.length) {
                if (guestListStatus) guestListStatus.textContent = 'No performance test guests found. Click "Setup 13 Test Guests" to create them.';
                if (guestListContainer) guestListContainer.style.display = 'none';
            } else {
                renderGuestList(guests);
                if (guestListStatus) guestListStatus.textContent = guests.length + ' performance test guests loaded.';
            }
        } catch (err) {
            showStatus('Error loading guest list: ' + err.message, 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Refresh List';
        }
    }

    function renderGuestList(guests) {
        var tbody = document.getElementById('guestListBody');
        tbody.innerHTML = '';

        var expectedReservations = 4;
        var sequentialCount = parseInt(document.getElementById('sequentialBatch').value) || 5;
        var concurrentCount = parseInt(document.getElementById('concurrentBatch').value) || 8;

        guests.forEach(function(g, i) {
            var tr = document.createElement('tr');

            // Determine assignment type
            var assignment;
            var assignmentClass;
            if (i < sequentialCount) {
                assignment = 'Sequential';
                assignmentClass = 'sequential';
            } else {
                assignment = 'Concurrent';
                assignmentClass = 'concurrent';
            }

            // Check reservation count
            var countClass = g.reservation_count === expectedReservations ? 'guest-count-ok' : 'guest-count-warn';

            tr.innerHTML =
                '<td>' + (i + 1) + '</td>' +
                '<td>' + escapeHtml(g.full_name) + '</td>' +
                '<td><span class="' + countClass + '">' + g.reservation_count + '</span></td>' +
                '<td><span class="guest-assignment ' + assignmentClass + '">' + assignment + '</span></td>';

            tbody.appendChild(tr);
        });

        document.getElementById('guestListContainer').style.display = 'block';

        // Auto-fill the customer name field with the first guest
        if (guests.length > 0) {
            document.getElementById('customerName').value = guests[0].full_name;
        }
    }

    // Load guest list on page load (deferred until DOM ready)
    whenReady(function initGuestList() {
        refreshGuestList();
    });
</script>
