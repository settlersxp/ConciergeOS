<script>
    /* ---- Toast Notifications ---- */
    function showToast(message, type) {
        var existing = document.querySelector('.toast');
        if (existing) existing.remove();

        var el = document.createElement('div');
        el.className = 'toast ' + type;
        el.textContent = message;
        document.body.appendChild(el);
        setTimeout(function() { el.remove(); }, 4000);
    }

    /* ---- Shift Reservations ---- */
    async function shiftReservations() {
        var btn = document.getElementById('shiftBtn');
        if (btn) {
            btn.disabled = true;
            btn.textContent = 'Shifting\u2026';
        }

        try {
            var res = await fetch('/api/debug/shift-reservations', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ days: 1 }),
            });
            var data = await res.json();

            if (data.ok) {
                showToast('Shifted ' + data.shifted + ' reservation(s) by +1 day', 'success');
            } else {
                showToast(data.error || 'Shift failed', 'error');
            }
        } catch (err) {
            showToast('Network error: ' + err.message, 'error');
        } finally {
            if (btn) {
                btn.disabled = false;
                btn.textContent = 'Shift +1 Day';
            }
        }
    }

    /* ---- UUID Generator ---- */
    function generateUuid() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
            var r = Math.random() * 16 | 0;
            var v = c === 'x' ? r : (r & 0x3 | 0x8);
            return v.toString(16);
        });
    }

    /* ---- Modal Helpers ---- */
    function openModal(overlayId) {
        var overlay = document.getElementById(overlayId);
        if (overlay) overlay.classList.add('visible');
    }

    function closeModal(overlayId) {
        var overlay = document.getElementById(overlayId);
        if (overlay) overlay.classList.remove('visible');
    }

    function closeModalOnOverlayClick(overlayId) {
        var overlay = document.getElementById(overlayId);
        if (overlay) {
            overlay.addEventListener('click', function(e) {
                if (e.target === overlay) closeModal(overlayId);
            });
        }
    }

    /* ---- Toggle Collapse ---- */
    function toggleCollapse(trigger, targetClass, rotatedClass) {
        var btn = trigger.querySelector('.toggle-btn');
        var body = trigger.nextElementSibling;
        if (body) body.classList.toggle(targetClass || 'collapsed');
        if (btn) btn.classList.toggle(rotatedClass || 'rotated');
    }
</script>
