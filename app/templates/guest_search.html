{% extends "base.html" %}
{% from 'components/macros.html' import button %}

{% block title %}ConciergeOS — Guest Search{% endblock %}

{% block styles %}
<style>
    /* ----- Search form ----- */
    .search-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 24px;
        margin-bottom: 24px;
    }
    .search-form {
        display: flex;
        gap: 12px;
        align-items: center;
    }
    .search-form input {
        flex: 1;
        padding: 10px 16px;
        border: 1px solid var(--border);
        border-radius: 6px;
        font-size: 1rem;
        outline: none;
        transition: border-color 0.15s;
    }
    .search-form input:focus {
        border-color: var(--primary);
    }
    .search-form .btn {
        padding: 10px 24px;
    }

    /* ----- Result area ----- */
    .result-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 24px;
        display: none;
    }
    .result-card.visible { display: block; }
    .result-card h2 {
        font-size: 1.1rem;
        margin-bottom: 12px;
        color: var(--muted);
    }
    .result-content {
        white-space: pre-wrap;
        font-size: 0.95rem;
        line-height: 1.7;
        color: var(--text);
    }
    .debug-info {
        background: #1a1a2e;
        color: #e0e0e0;
        font-family: 'Courier New', monospace;
        font-size: 0.85rem;
        padding: 16px;
        border-radius: 6px;
        margin-top: 16px;
        max-height: 300px;
        overflow-y: auto;
        display: none;
    }
    .debug-info.visible { display: block; }
    .debug-toggle {
        background: none;
        border: 1px solid var(--border);
        color: var(--muted);
        padding: 6px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.85rem;
        margin-top: 12px;
    }
    .debug-toggle:hover {
        border-color: var(--primary);
        color: var(--text);
    }
    .error-msg {
        color: #e74c3c;
    }
    .loading {
        color: #3498db;
        font-style: italic;
    }
</style>
{% endblock %}

{% block content %}
    <div class="search-card">
        <h1 style="font-size: 1.4rem; margin-bottom: 16px;">Guest Search</h1>
        <form class="search-form" id="searchForm">
            <input type="text" id="customerName" name="customer_name"
                   placeholder="Enter customer name (e.g. John Doe)" required autocomplete="off" />
            <button type="submit" id="searchBtn" class="btn btn-primary">Search</button>
        </form>
    </div>

    <div class="result-card" id="resultCard">
        <h2 id="resultTitle">Results for: <span id="resultQuery"></span></h2>
        <div class="result-content" id="resultContent"></div>
        <button id="debugToggle" class="debug-toggle" style="display:none;">Show Debug Info</button>
        <pre id="debugInfo" class="debug-info"></pre>
    </div>
    
    <script>
    // Show the debug toggle button when the result card is visible
    (function() {
        var observer = new MutationObserver(function(mutations) {
            mutations.forEach(function(mutation) {
                if (mutation.type === 'attributes' && mutation.attributeName === 'class') {
                    var resultCard = document.getElementById('resultCard');
                    var debugToggle = document.getElementById('debugToggle');
                    if (resultCard && debugToggle) {
                        if (resultCard.classList.contains('visible')) {
                            debugToggle.style.display = 'inline-block';
                        } else {
                            debugToggle.style.display = 'none';
                            document.getElementById('debugInfo').classList.remove('visible');
                        }
                    }
                }
            });
        });
        
        var resultCard = document.getElementById('resultCard');
        if (resultCard) {
            observer.observe(resultCard, { attributes: true });
        }
    })();
    </script>
{% endblock %}

{% block scripts %}
<script>
    var form = document.getElementById('searchForm');
    var input = document.getElementById('customerName');
    var btn = document.getElementById('searchBtn');
    var resultCard = document.getElementById('resultCard');
    var resultQuery = document.getElementById('resultQuery');
    var resultContent = document.getElementById('resultContent');

    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        var name = input.value.trim();
        if (!name) return;

        btn.disabled = true;
        btn.textContent = 'Searching...';
        resultCard.classList.add('visible');
        resultQuery.textContent = name;
        resultContent.className = 'result-content loading';
        resultContent.textContent = 'Querying LLM with tool calling, please wait...';
        
        // Clear any previous debug info
        var debugDiv = document.getElementById('debugInfo');
        if (debugDiv) debugDiv.classList.remove('visible');

        try {
            var res = await fetch('/api/guest-search', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ customer_name: name }),
            });

            var rawResponse = await res.text();
            
            if (!res.ok) {
                throw new Error('Server error: ' + res.status + ' | Response: ' + rawResponse);
            }

            var data;
            try {
                data = JSON.parse(rawResponse);
            } catch (e) {
                throw new Error('Invalid JSON response from server: ' + rawResponse.substring(0, 200));
            }
            
            // Show debug info to help troubleshoot
            var debugDiv = document.getElementById('debugInfo');
            debugDiv.textContent = JSON.stringify({
                endpoint: '/api/guest-search',
                statusCode: res.status,
                requestQuery: name,
                responseKeys: Object.keys(data),
                llm_response_length: data.llm_response ? data.llm_response.length : 0,
                llm_response_preview: data.llm_response ? data.llm_response.substring(0, 100) + '...' : '(empty)',
            }, null, 2);
            
            if (data.llm_response && data.llm_response !== 'The LLM returned an empty response.') {
                resultContent.className = 'result-content';
                resultContent.textContent = data.llm_response;
            } else {
                resultContent.className = 'result-content error-msg';
                resultContent.textContent = 'Results for: ' + name + '\n\n' + (data.llm_response || '(empty response)');
                debugDiv.classList.add('visible');
            }
        } catch (err) {
            resultContent.className = 'result-content error-msg';
            resultContent.textContent = 'Error: ' + err.message;
            
            var debugDiv = document.getElementById('debugInfo');
            debugDiv.textContent = 'Request Error:\n' + err.message + '\n\n' +
                'Check that:\n' +
                '1. The FastAPI server is running on port 8000\n' +
                '2. The LLM endpoint is configured correctly in Settings\n' +
                '3. The model supports tool calling\n\n' +
                'You can also test the API directly:\n' +
                '  curl -X POST http://localhost:8000/api/guest-search \\\n' +
                '    -H "Content-Type: application/json" \\\n' +
                '    -d \'{"customer_name": "fares"}\'';
            debugDiv.classList.add('visible');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Search';
        }
    });
    
    // Toggle debug info visibility
    var debugToggle = document.getElementById('debugToggle');
    if (debugToggle) {
        debugToggle.addEventListener('click', function() {
            var debugDiv = document.getElementById('debugInfo');
            debugDiv.classList.toggle('visible');
            this.textContent = debugDiv.classList.contains('visible') ? 'Hide Debug Info' : 'Show Debug Info';
        });
    }
</script>
{% endblock %}
