{% extends "base.html" %}
{% from 'components/macros.html' import button %}

{% block title %}ConciergeOS — Guest Search{% endblock %}

{% block styles %}
<style>
    /* ----- Search form ----- */
    .search-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 24px;
        margin-bottom: 24px;
    }
    .search-form {
        display: flex;
        gap: 12px;
        align-items: center;
    }
    .search-form input {
        flex: 1;
        padding: 10px 16px;
        border: 1px solid var(--border);
        border-radius: 6px;
        font-size: 1rem;
        outline: none;
        transition: border-color 0.15s;
    }
    .search-form input:focus {
        border-color: var(--primary);
    }
    .search-form .btn {
        padding: 10px 24px;
    }

    /* ----- Result area ----- */
    .result-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 24px;
        display: none;
    }
    .result-card.visible { display: block; }
    .result-card h2 {
        font-size: 1.1rem;
        margin-bottom: 12px;
        color: var(--muted);
    }
    .result-content {
        white-space: pre-wrap;
        font-size: 0.95rem;
        line-height: 1.7;
        color: var(--text);
    }
</style>
{% endblock %}

{% block content %}
    <div class="search-card">
        <h1 style="font-size: 1.4rem; margin-bottom: 16px;">Guest Search</h1>
        <form class="search-form" id="searchForm">
            <input type="text" id="customerName" name="customer_name"
                   placeholder="Enter customer name (e.g. John Doe)" required autocomplete="off" />
            <button type="submit" id="searchBtn" class="btn btn-primary">Search</button>
        </form>
    </div>

    <div class="result-card" id="resultCard">
        <h2 id="resultTitle">Results for: <span id="resultQuery"></span></h2>
        <div class="result-content" id="resultContent"></div>
    </div>
{% endblock %}

{% block scripts %}
<script>
    var form = document.getElementById('searchForm');
    var input = document.getElementById('customerName');
    var btn = document.getElementById('searchBtn');
    var resultCard = document.getElementById('resultCard');
    var resultQuery = document.getElementById('resultQuery');
    var resultContent = document.getElementById('resultContent');

    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        var name = input.value.trim();
        if (!name) return;

        btn.disabled = true;
        btn.textContent = 'Searching...';
        resultCard.classList.add('visible');
        resultQuery.textContent = name;
        resultContent.className = 'result-content loading';
        resultContent.textContent = 'Querying LLM, please wait...';

        try {
            var res = await fetch('/api/guest-search', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ customer_name: name }),
            });

            if (!res.ok) {
                var errData = await res.json().catch(function() { return null; });
                throw new Error(errData?.detail || 'Server error: ' + res.status);
            }

            var data = await res.json();
            resultContent.className = 'result-content';
            resultContent.textContent = data.llm_response;
        } catch (err) {
            resultContent.className = 'result-content error-msg';
            resultContent.textContent = 'Error: ' + err.message;
        } finally {
            btn.disabled = false;
            btn.textContent = 'Search';
        }
    });
</script>
{% endblock %}
