services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "2019:2019"
    volumes:
      - ./Caddyfile.json:/etc/caddy/Caddyfile.json
      - caddy_data:/data
      - caddy_config:/config
    command: caddy run --config /etc/caddy/Caddyfile.json
    depends_on:
      - frontend
      - keycloak
      - oidc-main
    networks:
      - app-network

  oidc-main:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.3
    container_name: oidc-main
    restart: unless-stopped
    extra_hosts:
      - "out-customer.com:host-gateway"
    environment:
      # Provider
      - OAUTH2_PROXY_PROVIDER=${OAUTH2_PROXY_PROVIDER:-keycloak-oidc}
      - OAUTH2_PROXY_OIDC_ISSUER_URL=${APP_DOMAIN:-https://out-customer.com}/auth/realms/${OIDC_REALM:-production}
      - OAUTH2_PROXY_CLIENT_ID=${OIDC_CLIENT_ID:-concierge}
      - OAUTH2_PROXY_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-}
      - OAUTH2_PROXY_REDIRECT_URL=${APP_DOMAIN:-https://out-customer.com}/oauth2/callback
      - OAUTH2_PROXY_SKIP_PROVIDER_BUTTON=${OAUTH2_PROXY_SKIP_PROVIDER_BUTTON:-true}
      # Cookie
      - OAUTH2_PROXY_COOKIE_SECRET=${OAUTH2_COOKIE_SECRET:-}
      - OAUTH2_PROXY_COOKIE_SECURE=${OAUTH2_PROXY_COOKIE_SECURE:-false}
      - OAUTH2_PROXY_COOKIE_REFRESH=${OAUTH2_PROXY_COOKIE_REFRESH:-5m}
      - OAUTH2_PROXY_COOKIE_EXPIRE=${OAUTH2_PROXY_COOKIE_EXPIRE:-1h}
      # Upstreams
      - OAUTH2_PROXY_UPSTREAMS=${OAUTH2_PROXY_UPSTREAMS:-http://frontend:80/}
      # Server
      - OAUTH2_PROXY_HTTP_ADDRESS=${OAUTH2_PROXY_HTTP_ADDRESS:-0.0.0.0:4182}
      - OAUTH2_PROXY_REVERSE_PROXY=${OAUTH2_PROXY_REVERSE_PROXY:-true}
      # OIDC
      - OAUTH2_PROXY_SCOPE=${OAUTH2_PROXY_SCOPE:-openid profile email roles}
      - OAUTH2_PROXY_EMAIL_DOMAINS=${OAUTH2_PROXY_EMAIL_DOMAINS:-*}
      - OAUTH2_PROXY_OIDC_GROUPS_CLAIM=${OAUTH2_PROXY_OIDC_GROUPS_CLAIM:-realm_access.roles}
      - OAUTH2_PROXY_SSL_INSECURE_SKIP_VERIFY=${OAUTH2_PROXY_SSL_INSECURE_SKIP_VERIFY:-true}
      - OAUTH2_PROXY_CODE_CHALLENGE_METHOD=${OAUTH2_PROXY_CODE_CHALLENGE_METHOD:-S256}
      - OAUTH2_PROXY_OIDC_EXTRA_AUDIENCES=${OAUTH2_PROXY_OIDC_EXTRA_AUDIENCES:-account}
      # Session storage (Valkey/Redis)
      - OAUTH2_PROXY_SESSION_STORE_TYPE=${OAUTH2_PROXY_SESSION_STORE_TYPE:-redis}
      - OAUTH2_PROXY_REDIS_CONNECTION_URL=${VALKEY_URL:-redis://valkey:6379/0}
    depends_on:
      - keycloak
      - frontend
      - valkey
    networks:
      - app-network

  role-sync:
    image: concos-role-sync:latest
    build:
      context: .
      dockerfile: Dockerfile.role-sync
    container_name: role-sync
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - KEYCLOAK_URL=${KEYCLOAK_URL:-http://keycloak:8080/auth}
      - KEYCLOAK_REALM=${OIDC_REALM:-production}
      - KEYCLOAK_ADMIN_USER=${KEYCLOAK_ADMIN_USER:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      - CADDY_ADMIN_URL=${CADDY_ADMIN_URL:-http://caddy:2019}
      - SYNC_INTERVAL=${SYNC_INTERVAL:-30}
      - VALKEY_URL=${VALKEY_URL:-redis://valkey:6379/0}
      - SESSION_COOKIE_NAME=${SESSION_COOKIE_NAME:-_oauth2_proxy}
    depends_on:
      - keycloak
      - caddy
      - valkey
    networks:
      - app-network

  valkey:
    image: valkey/valkey:8-alpine
    container_name: valkey
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    image: concos-frontend:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: frontend
    restart: unless-stopped
    networks:
      - app-network

  backend:
    image: concos-backend:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: backend
    restart: unless-stopped
    networks:
      - app-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak
    restart: unless-stopped
    volumes:
      - keycloak_data:/opt/keycloak/data
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME: "${APP_DOMAIN:-https://out-customer.com}/auth"
      KC_HTTP_RELATIVE_PATH: ${KC_HTTP_PATH:-/auth}
      KC_HTTP_ENABLED: "${KC_HTTP_ENABLED:-true}"
    command: start-dev
    ports:
      - "8080:8080"
    networks:
      - app-network

volumes:
  caddy_data:
  caddy_config:
  keycloak_data:

networks:
  app-network:
    driver: bridge