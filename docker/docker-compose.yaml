services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.json:/etc/caddy/Caddyfile.json
      - caddy_data:/data
      - caddy_config:/config
    command: caddy run --config /etc/caddy/Caddyfile.json
    depends_on:
      - frontend
      - keycloak
      - oidc-settings
      - oidc-main
    networks:
      - app-network

  oidc-settings:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.3
    container_name: oidc-settings
    restart: unless-stopped
    extra_hosts:
      - "out-customer.com:host-gateway"
    volumes:
      - ./oidc-settings.toml:/cfg.toml
    command: oauth2-proxy --config /cfg.toml
    depends_on:
      - keycloak
      - frontend
    networks:
      - app-network

  oidc-main:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.3
    container_name: oidc-main
    restart: unless-stopped
    extra_hosts:
      - "out-customer.com:host-gateway"
    volumes:
      - ./oidc-main.toml:/cfg.toml
    command: oauth2-proxy --config /cfg.toml
    depends_on:
      - keycloak
      - frontend
    networks:
      - app-network

  frontend:
    image: concos-frontend:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: frontend
    restart: unless-stopped
    networks:
      - app-network

  backend:
    image: concos-backend:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: backend
    restart: unless-stopped
    networks:
      - app-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: "https://out-customer.com/auth"
      KC_HOSTNAME_STRICT: "true"
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HTTP_ENABLED: "true"
    command: start-dev
    ports:
      - "8080:8080"
    networks:
      - app-network

volumes:
  caddy_data:
  caddy_config:

networks:
  app-network:
    driver: bridge